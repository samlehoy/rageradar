<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RageRadar — Real-time emotion detection for gamers" />
  <title>RageRadar — Emotion Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
            dm: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            clay: '#E0E5EC',
            fg: '#3D4852',
            muted: '#6B7280',
            violet: '#6C63FF',
            violetLight: '#8B84FF',
            teal: '#38B2AC',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="sr-announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
